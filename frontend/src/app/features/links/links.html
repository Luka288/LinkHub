<section id="links-section">
  <div id="links-main">
    <div class="user">
      <app-user-card [userData]="user()" />

      <div class="action">
        <button class="btn-dashed" (click)="openCreate()">
          <i class="fa-solid fa-plus"></i>
          Add Link
        </button>
      </div>
    </div>

    <div
      class="user-urls"
      cdkDropList
      [cdkDropListData]="user()?.links"
      (cdkDropListDropped)="onDrop($event)"
    >
      <div class="base-action">
        <button class="copy-link-btn" (click)="copyUrl()">
          <i class="fa-solid fa-link"></i>
          {{ isCopied() ? "Copied!" : "Copy profile link" }}
        </button>

        <button class="share-qr-btn" (click)="openShare()">
          <i class="fa-solid fa-qrcode"></i>
          Share
        </button>
      </div>

      @for (link of user()?.links; track link.id) {
        <app-url-card
          cdkDrag
          [cdkDragData]="link"
          [urlData]="link"
          (toggleChanged)="onToggleChanged($event)"
          (openEdit)="openModify(link)"
          (emitDelete)="onRemove($event)"
        />
      }
    </div>
  </div>

  <aside id="preview">
    <app-preview [data]="user()" />
  </aside>
</section>
